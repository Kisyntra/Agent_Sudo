name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run unit tests
      run: python -m unittest discover -s tests

    - name: Check for personal data
      run: python scripts/check_no_personal_data.py

    - name: Check git diff whitespace
      run: |
        # Check if the latest commit introduced trailing whitespace or layout errors
        git diff --check HEAD~1..HEAD

    - name: Compile Python package files
      run: python -m compileall agent_sudo/
